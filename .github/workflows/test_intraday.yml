name: 🧪 [测试] 盘中高频推送 (30min x 2次)

on:
  # 仅允许手动触发
  workflow_dispatch:
    inputs:
      interval_minutes:
        description: '每次发送间隔 (分钟)'
        required: true
        default: '30'
        type: number
      run_count:
        description: '总共运行几次'
        required: true
        default: '2'
        type: number

jobs:
  test-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
      
      - name: 🔄 执行循环测试
        env:
          # --- 基础配置 ---
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          
          # --- 核心逻辑配置 (通过环境变量控制) ---
          REPORT_TYPE: 'simple'                # 设置为精简模式
          MARKET_REVIEW_ENABLED: 'false'       # 关闭大盘复盘
          FORCE_RUN: 'true'                    # 强制运行 (忽略节假日检查)
          TRADING_DAY_CHECK_ENABLED: 'false'   # 双重保险：关闭内部交易日检查
          
        run: |
          INTERVAL=${{ github.event.inputs.interval_minutes || 30 }}
          COUNT=${{ github.event.inputs.run_count || 2 }}
          
          echo "🧪 开始测试..."
          echo "⏱️ 间隔: $INTERVAL 分钟"
          echo "🔢 次数: $COUNT 次"
          echo "⚠️  模式: 强制运行 (忽略节假日)"
          echo ""
          
          for i in $(seq 1 $COUNT); do
            echo "=========================================="
            echo "🚀 第 $i / $COUNT 次运行开始"
            echo "⏰ 时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
            echo "=========================================="
            
            # 如果不是第一次，先等待
            if [ $i -gt 1 ]; then
              echo "💤 等待 $INTERVAL 分钟..."
              SLEEP_SECONDS=$((INTERVAL * 60))
              sleep $SLEEP_SECONDS
            fi
            
            # ✅ 修复：去掉了不支持的 --report-type 参数
            # 只保留 main.py 支持的参数：--no-market-review 和 --force-run
            python main.py --no-market-review --force-run
            
            echo "✅ 第 $i 次运行完成"
            echo ""
          done
          
          echo "🎉 所有测试任务完成！"
